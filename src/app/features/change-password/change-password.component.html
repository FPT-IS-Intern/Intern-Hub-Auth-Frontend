<div class="changepass-page">
  <div class="changepass-card">
    <h1 class="title">{{ title() }}</h1>

    @if (successMessage()) {
      <div class="success-message">
        <i class="dsi dsi-check-line"></i>
        <p>{{ successMessage() }}</p>
      </div>
    }

    <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
      <div class="group-input">
        <app-input-text
          headerInput="Mật khẩu"
          placeholder="Nhập mật khẩu"
          [required]="true"
          icon="dsi-eye-line"
          [(value)]="newPassword"
          type="password"
        ></app-input-text>

        @if (error()) {
          <div class="error-wrapper">
            <app-error-message [message]="error()!"></app-error-message>
          </div>
        }

        <app-input-text
          headerInput="Xác nhận mật khẩu"
          placeholder="Nhập lại mật khẩu"
          [required]="true"
          icon="dsi-eye-line"
          [(value)]="confirmPassword"
          type="password"
        ></app-input-text>
      </div>

      <button type="submit" class="btn-login" [disabled]="checkInputRequired() || isLoading() || successMessage()">
        @if (isLoading()) {
          <span class="loading-state">
            <i class="dsi dsi-activity-line dsi-spin"></i>
            Đang xử lý...
          </span>
        } @else {
          Xác nhận
        }
      </button>
    </form>
  </div>
</div>
