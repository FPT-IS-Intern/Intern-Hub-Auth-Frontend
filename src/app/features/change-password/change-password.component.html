<div class="changepass-page">
  <div class="changepass-card">
    <h1 class="title">{{ title() }}</h1>

    <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
      <div class="group-input">
        <app-input-text
          headerInput="Mật khẩu"
          placeholder="Nhập mật khẩu"
          [required]="true"
          [typeInput]="showNewPassword() ? 'text' : 'password'"
          [icon]="showNewPassword() ? 'dsi-eye-off-line' : 'dsi-eye-line'"
          (iconClick)="toggleNewPassword()"
          [(value)]="newPassword"
        ></app-input-text>

        <ul class="password-rules">
          <li [class.valid]="hasMinLength()">
            <span class="rule-icon">
              @if (hasMinLength()) {
                <i class="dsi dsi-check-line"></i>
              }
            </span>
            Ít nhất 8 ký tự
          </li>
          <li [class.valid]="hasRequiredChars()">
            <span class="rule-icon">●</span>
            Chứa CHỮ HOA, chữ thường và số, các ký tự đặc biệt bao gồm: !@#$%^&*().
          </li>
          <li [class.valid]="hasNoAccentsOrSpaces()">
            <span class="rule-icon">●</span>
            Không chứa dấu và khoảng trắng
          </li>
          <li [class.valid]="hasMaxLength()">
            <span class="rule-icon">
              @if (hasMaxLength()) {
                <i class="dsi dsi-check-line"></i>
              }
            </span>
            Tối đa 15 ký tự
          </li>
        </ul>

        @if (error()) {
          <div class="error-wrapper">
            <app-error-message [message]="error()!"></app-error-message>
          </div>
        }

        <app-input-text
          headerInput="Xác nhận mật khẩu"
          placeholder="Nhập lại mật khẩu"
          [required]="true"
          [typeInput]="showConfirmPassword() ? 'text' : 'password'"
          [icon]="showConfirmPassword() ? 'dsi-eye-off-line' : 'dsi-eye-line'"
          (iconClick)="toggleConfirmPassword()"
          [(value)]="confirmPassword"
        ></app-input-text>
      </div>

      <button type="submit" class="btn-login" [disabled]="checkInputRequired() || isLoading()">
        @if (isLoading()) {
          <span class="loading-state">
            <i class="dsi dsi-activity-line dsi-spin"></i>
            Đang xử lý...
          </span>
        } @else {
          Xác nhận
        }
      </button>
    </form>
  </div>
</div>
