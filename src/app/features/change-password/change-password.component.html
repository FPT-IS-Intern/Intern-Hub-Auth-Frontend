<div class="changepass-page">
  <div class="changepass-card">
    <h1 class="title">{{ title() }}</h1>

    <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
      <div class="group-input">
        <app-input-text
          headerInput="Mật khẩu"
          placeholder="Nhập mật khẩu"
          [required]="true"
          [typeInput]="showNewPassword() ? 'text' : 'password'"
          [icon]="showNewPassword() ? 'dsi-eye-off-line' : 'dsi-eye-line'"
          (iconClick)="toggleNewPassword()"
          [(value)]="newPassword"
        ></app-input-text>

        @if (error()) {
          <div class="error-wrapper">
            <app-error-message [message]="error()!"></app-error-message>
          </div>
        }

        <app-input-text
          headerInput="Xác nhận mật khẩu"
          placeholder="Nhập lại mật khẩu"
          [required]="true"
          [typeInput]="showConfirmPassword() ? 'text' : 'password'"
          [icon]="showConfirmPassword() ? 'dsi-eye-off-line' : 'dsi-eye-line'"
          (iconClick)="toggleConfirmPassword()"
          [(value)]="confirmPassword"
        ></app-input-text>
      </div>

      <button type="submit" class="btn-login" [disabled]="checkInputRequired() || isLoading() || popup().show">
        @if (isLoading()) {
          <span class="loading-state">
            <i class="dsi dsi-activity-line dsi-spin"></i>
            Đang xử lý...
          </span>
        } @else {
          Xác nhận
        }
      </button>
    </form>
  </div>
</div>

@if (popup().show) {
  <app-pop-up-info
    [title]="popup().title"
    [content]="popup().content"
    imgUrl="https://s3.vn-hcm-1.vietnix.cloud/bravos/uploads/success-popup.svg"
    colorButton="#22c55e"
    [actionLabel]="popup().actionLabel"
    (actionClick)="closeSuccessPopup()"
  >
  </app-pop-up-info>
}
