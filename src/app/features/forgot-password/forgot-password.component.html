<div class="login-page">
  <div class="login-card">
    <!-- Nút quay lại ở trên cùng -->
    <div class="back-navigation" routerLink="/auth/login">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="back-icon"
      >
        <path
          d="M15 18L9 12L15 6"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span>Quay lại đăng nhập</span>
    </div>

    <h1 class="title">Quên mật khẩu</h1>
    <p class="subtitle">Nhập thông tin để khôi phục mật khẩu của bạn</p>

    <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
      <div class="group-input">
        <app-input-text
          headerInput="CCCD/CMND"
          placeholder="Nhập CCCD/CMND"
          [required]="true"
          [(value)]="personalId"
          [maxLength]="12"
          typeInput="number"
        ></app-input-text>

        <app-input-text
          headerInput="Email tài khoản"
          placeholder="example@gmail.com"
          [required]="true"
          typeInput="email"
          [(value)]="email"
        ></app-input-text>
      </div>

      @if (error()) {
        <div class="error-wrapper">
          <app-error-message [message]="error()!"></app-error-message>
        </div>
      }

      <button type="submit" class="btn-login" [disabled]="isLoading() || checkInputRequired()">
        @if (isLoading()) {
          <span class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            Đang xử lý...
          </span>
        } @else {
          Gửi mã xác thực
        }
      </button>
    </form>

    <div class="divider"></div>

    <div class="footer">
      <p class="help-text">
        Bạn cần hỗ trợ thêm? <a href="mailto:support@fpt.com" class="link">Liên hệ hỗ trợ</a>
      </p>
    </div>
  </div>
</div>
