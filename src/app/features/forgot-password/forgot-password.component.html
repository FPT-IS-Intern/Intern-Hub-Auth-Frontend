<div class="login-page">
  <div class="login-card">
    <!-- Nút quay lại ở trên cùng -->
    <div class="back-navigation" routerLink="/auth/login">
      <i class="dsi dsi-arrow-left-line back-icon dsi-lg"></i>
      <span>Quay lại đăng nhập</span>
    </div>

    <h1 class="title">{{ title() }}</h1>
    <p class="subtitle">{{ subtitle() }}</p>

    <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
      <div class="group-input">
        <app-input-text
          headerInput="CCCD/CMND"
          placeholder="Nhập CCCD/CMND"
          [required]="true"
          [(value)]="personalId"
          [maxLength]="12"
          typeInput="number"
        ></app-input-text>

        <app-input-text
          headerInput="Email tài khoản"
          placeholder="example@fpt.com"
          [required]="true"
          typeInput="email"
          [(value)]="email"
        ></app-input-text>
      </div>

      @if (error()) {
        <div class="error-wrapper">
          <app-error-message [message]="error()!"></app-error-message>
        </div>
      }

      <button type="submit" class="btn-login" [disabled]="isLoading() || checkInputRequired()">
        @if (isLoading()) {
          <span class="loading-state">
            <i class="dsi dsi-activity-line dsi-spin"></i>
            Đang xử lý...
          </span>
        } @else {
          Gửi mã xác thực
        }
      </button>
    </form>

    <div class="divider"></div>

    <div class="footer">
      <p class="help-text">Bạn cần hỗ trợ thêm? <a href="" class="link">Liên hệ hỗ trợ</a></p>
    </div>
  </div>
</div>

@if (popup().show) {
  <app-pop-up-info
    [title]="popup().title"
    [content]="popup().content"
    imgUrl="https://s3.vn-hcm-1.vietnix.cloud/bravos/uploads/failed-popup.svg"
    colorButton="#F59E0B"
    actionLabel="Quay lại đăng nhập"
    (actionClick)="closePopup()">
  </app-pop-up-info>
}
