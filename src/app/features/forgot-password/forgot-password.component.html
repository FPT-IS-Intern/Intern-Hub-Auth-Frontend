<div class="login-page">
    <div class="login-card">
        <h1 class="title">Quên mật khẩu</h1>

        <form (submit)="$event.preventDefault(); handleSubmit()" class="form-container">
            <div class="group-input">
                <app-input-text headerInput="CCCD/CMND" placeholder="Nhập CCCD/CMND" [required]="true"
                    [(value)]="personalId" [maxLength]="12" typeInput="number"></app-input-text>

                <app-input-text headerInput="Email tài khoản" placeholder="example@gmail.com" [required]="true"
                    typeInput="email" [(value)]="email"></app-input-text>
            </div>

            @if (error()) {
            <div class="error-wrapper">
                <app-error-message [message]="error()!"></app-error-message>
            </div>
            }

            <button type="submit" class="btn-login" [disabled]="isLoading() || checkInputRequired()">

                @if (isLoading()) {
                <span class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    Đang xử lý...
                </span>
                } @else {
                Gửi mã xác thực
                }
            </button>
        </form>

        <div class="footer">
            <a routerLink="/" class="link">Quay lại trang đăng nhập</a>
        </div>
    </div>
</div>
