server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Federation/runtime descriptors should always be revalidated to avoid
    # stale chunk references after new deployments.
    location = /remoteEntry.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    # Never rewrite missing JS/CSS chunks to index.html.
    location ~* \.(?:js|mjs|css|map|json|wasm)$ {
        try_files $uri =404;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
    }

    location / {
        try_files $uri $uri/ /index.html;

        # --- CORS CONFIGURATION ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        # --- HANDLE CORS PREFLIGHT ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}